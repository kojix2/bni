name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux-static:
    name: Build Linux static binary and library
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build static binary
        run: |
          docker run --rm \
            -e HTSLIB_VERSION=1.23.1 \
            -v "$PWD:/work" \
            -w /work \
            alpine:3.20 \
            sh -euxc '
              apk add --no-cache \
                bash \
                bzip2-static \
                bzip2-dev \
                ca-certificates \
                coreutils \
                curl \
                file \
                g++ \
                libc-utils \
                make \
                tar \
                xz-static \
                xz-dev \
                zlib-static \
                zlib-dev

              curl -fsSL "https://github.com/samtools/htslib/releases/download/${HTSLIB_VERSION}/htslib-${HTSLIB_VERSION}.tar.bz2" -o htslib.tar.bz2
              tar -xjf htslib.tar.bz2
              cd "htslib-${HTSLIB_VERSION}"
              ./configure \
                --prefix=/work/.htslib \
                --disable-libcurl \
                --disable-s3 \
                --disable-gcs
              make -j"$(nproc)" libhts.a
              make install
              cd /work

              make clean
              make \
                CC=cc \
                CPPFLAGS="-I/work/.htslib/include" \
                LDFLAGS="-static -L/work/.htslib/lib" \
                LDLIBS="/work/.htslib/lib/libhts.a -lz -lbz2 -llzma -lm -lpthread"
            '

      - name: Verify static binary
        run: |
          file ./bni
          ./bni version
          if ldd ./bni 2>&1 | grep -Eq "not a dynamic executable|statically linked"; then
            echo "static link check OK"
          else
            echo "bni is dynamically linked" >&2
            ldd ./bni >&2
            exit 1
          fi

      - name: Check version matches tag
        if: github.ref_type == 'tag'
        run: |
          expected="${GITHUB_REF_NAME#v}"
          actual="$(./bni version | awk '{print $2}')"
          if [ "$actual" != "$expected" ]; then
            echo "version mismatch: tag=${GITHUB_REF_NAME} binary=${actual}" >&2
            exit 1
          fi

      - name: Run smoke test
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends samtools
          bash tests/smoke.sh ./bni

      - name: Package binary
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="$GITHUB_REF_NAME"
          else
            version="$(printf '%.12s' "${GITHUB_SHA:-manual}")"
          fi
          asset="bni-${version}-linux-x86_64"
          mkdir -p "dist/${asset}"
          cp bni LICENSE README.md "dist/${asset}/"
          tar -C dist -czf "dist/${asset}.tar.gz" "${asset}"
          sha256sum "dist/${asset}.tar.gz" > "dist/${asset}.tar.gz.sha256"

      - name: Package library
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="$GITHUB_REF_NAME"
          else
            version="$(printf '%.12s' "${GITHUB_SHA:-manual}")"
          fi
          asset="libbni-${version}-linux-x86_64"
          mkdir -p "dist/${asset}/include" "dist/${asset}/lib" "dist/${asset}/docs"
          cp include/bni.h "dist/${asset}/include/"
          cp libbni.a "dist/${asset}/lib/"
          cp LICENSE README.md "dist/${asset}/"
          cp docs/*.md "dist/${asset}/docs/"
          cat > "dist/${asset}/README.release.md" <<'EOF'
          This package contains libbni.a and bni.h. Downstream builds must also
          provide htslib headers and link with htslib and its dependencies.
          EOF
          tar -C dist -czf "dist/${asset}.tar.gz" "${asset}"
          sha256sum "dist/${asset}.tar.gz" > "dist/${asset}.tar.gz.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: bni-linux-x86_64
          path: |
            dist/*.tar.gz
            dist/*.sha256

  macos-portable:
    name: Build portable macOS binary and library
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build binary with bundled static htslib
        env:
          HTSLIB_VERSION: 1.23.1
        run: |
          set -eux
          curl -fsSL "https://github.com/samtools/htslib/releases/download/${HTSLIB_VERSION}/htslib-${HTSLIB_VERSION}.tar.bz2" -o htslib.tar.bz2
          tar -xjf htslib.tar.bz2
          cd "htslib-${HTSLIB_VERSION}"
          ./configure \
            --prefix="$PWD/../.htslib" \
            --disable-libcurl \
            --disable-s3 \
            --disable-gcs \
            --disable-bz2 \
            --disable-lzma
          make -j"$(sysctl -n hw.ncpu)" libhts.a
          make install
          cd ..

          make clean
          make bni libbni.a \
            CC=clang \
            CPPFLAGS="-I$PWD/.htslib/include" \
            LDFLAGS="-L$PWD/.htslib/lib" \
            LDLIBS="$PWD/.htslib/lib/libhts.a -lz -lm -lpthread"

      - name: Verify portable binary
        run: |
          set -eux
          file ./bni
          ./bni version
          otool -L ./bni
          if otool -L ./bni | grep -E '/opt/homebrew|/usr/local|libhts|libbz2|liblzma'; then
            echo "bni has non-portable Homebrew/local or optional htslib dependencies" >&2
            exit 1
          fi

      - name: Check version matches tag
        if: github.ref_type == 'tag'
        run: |
          expected="${GITHUB_REF_NAME#v}"
          actual="$(./bni version | awk '{print $2}')"
          if [ "$actual" != "$expected" ]; then
            echo "version mismatch: tag=${GITHUB_REF_NAME} binary=${actual}" >&2
            exit 1
          fi

      - name: Run smoke test
        run: |
          brew install samtools
          bash tests/smoke.sh ./bni

      - name: Package binary
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="$GITHUB_REF_NAME"
          else
            version="$(printf '%.12s' "${GITHUB_SHA:-manual}")"
          fi
          asset="bni-${version}-macos-x86_64"
          mkdir -p "dist/${asset}"
          cp bni LICENSE README.md "dist/${asset}/"
          tar -C dist -czf "dist/${asset}.tar.gz" "${asset}"
          shasum -a 256 "dist/${asset}.tar.gz" > "dist/${asset}.tar.gz.sha256"

      - name: Package library
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="$GITHUB_REF_NAME"
          else
            version="$(printf '%.12s' "${GITHUB_SHA:-manual}")"
          fi
          asset="libbni-${version}-macos-x86_64"
          mkdir -p "dist/${asset}/include" "dist/${asset}/lib" "dist/${asset}/docs"
          cp include/bni.h "dist/${asset}/include/"
          cp libbni.a "dist/${asset}/lib/"
          cp LICENSE README.md "dist/${asset}/"
          cp docs/*.md "dist/${asset}/docs/"
          cat > "dist/${asset}/README.release.md" <<'EOF'
          This package contains libbni.a and bni.h. Downstream builds must also
          provide htslib headers and link with htslib and its dependencies.
          EOF
          tar -C dist -czf "dist/${asset}.tar.gz" "${asset}"
          shasum -a 256 "dist/${asset}.tar.gz" > "dist/${asset}.tar.gz.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: bni-macos-x86_64
          path: |
            dist/*.tar.gz
            dist/*.sha256

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - linux-static
      - macos-portable
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
